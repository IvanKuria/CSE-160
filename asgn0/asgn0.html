<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <div>
      v1: x
      <input type="number" id="x" name="x" required />
      y
      <input type="number" id="y" name="y" required />
    </div>
    <div>
      v2: x
      <input type="number" id="x-2" name="x-2" required />
      y
      <input type="number" id="y-2" name="y-2" required />
    </div>
    <button title="Draw" type="button" onclick="handleDrawEvent()">Draw</button>
    <div>
      Operation:
      <select id="op-select">
        <option value="add">Add</option>
        <option value="sub">Subtract</option>
        <option value="mul">Multiply</option>
        <option value="div">Divide</option>
        <option value="magnitude">Magnitude</option>
        <option value="normalize">Normalize</option>
      </select>
      Scalar:
      <input type="number" id="scalar" />
      <button type="button" onclick="handleDrawOperationEvent()">Draw</button>
    </div>
    <script src="/asgn0/lib/cuon-matrix-cse160.js"></script>
    <script src="asgn0.js"></script>
  </body>
</html>
